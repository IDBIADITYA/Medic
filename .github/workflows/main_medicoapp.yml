name: Build and deploy Python app to Azure Web App - medicoapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check project structure
        run: |
          ls
          ls Medico
          test -f Medico/requirements.txt
          test -f Medico/manage.py

      - name: Install dependencies
        working-directory: ./Medico
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: Medico

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_68D90EA826934CEE887D2687532DA1CE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E54BC5A512924768AECE54C6E6EF272F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_73BC869F6F244990A2CD6A03E61DB342 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: medicoapp
          slot-name: Production
