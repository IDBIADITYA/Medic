name: Build and deploy Python app to Azure Web App - medicoapp
on:
push:
branches:- main
workflow_dispatch:
jobs:
build:
runs-on: ubuntu-latest
steps:- uses: actions/checkout@v4- name: Set up Python
uses: actions/setup-python@v5
with:
python-version: '3.12'- name: Install dependencies
working-directory: ./Medico
run: |
python -m pip install --upgrade pip
pip install -r requirements.txt- name: Upload artifact
5
uses: actions/upload-artifact@v4
with:
name: python-app
path: Medico
deploy:
runs-on: ubuntu-latest
needs: build
steps:- uses: actions/download-artifact@v4
with:
name: python-app- uses: azure/login@v2
with:
client-id: ${{ secrets.CLIENT_ID }}
tenant-id: ${{ secrets.TENANT_ID }}
subscription-id: ${{ secrets.SUBSCRIPTION_ID }}- uses: azure/webapps-deploy@v3
with:
app-name: medicoapp
